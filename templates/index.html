<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bike Rental Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>🚴‍♂️ Bike Rental Predictor Based on Weather</h2>
        <form action="/predict" method="post">
            <label>Temperature (0 - 1 scale):</label><br>
            <input type="text" name="temp" required><br>
            <label>Humidity (0 - 1 scale):</label><br>
            <input type="text" name="hum" required><br>
            <label>Windspeed (0 - 1 scale):</label><br>
            <input type="text" name="wind" required><br><br>
            <button type="submit">Predict</button>
        </form>
        {% if prediction_text %}
            <h3>{{ prediction_text }}</h3>
        {% endif %}
    </div>
</body>
</html>
